name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      wrangler_env:
        required: true
        type: string
      url:
        required: false
        type: string
      worker_name:
        required: false
        type: string
        description: Override the worker name (for per-PR preview deployments)
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      GOOGLE_RECAPTCHA_SECRET_KEY:
        required: false
      RESEND_API_KEY:
        required: true
      CONTENTFUL_SPACE_ID:
        required: true
      CONTENTFUL_DELIVERY_TOKEN:
        required: true
      CONTENTFUL_PREVIEW_TOKEN:
        required: true
      CONTENTFUL_SIGNIN_TOKEN:
        required: true
      ASTRO_DB_REMOTE_URL:
        required: true
      ASTRO_DB_APP_TOKEN:
        required: true

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.wrangler_env }}-${{ inputs.worker_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ENV: ${{ inputs.wrangler_env }}
      SITE_URL: ${{ vars.SITE_URL }}
      BIANCA_EMAIL: ${{ vars.BIANCA_EMAIL }}
      TWITTER_HANDLE: ${{ vars.TWITTER_HANDLE }}
      GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID }}
      GOOGLE_TAG_MANAGER_ID: ${{ vars.GOOGLE_TAG_MANAGER_ID }}
      GOOGLE_RECAPTCHA_SITE_KEY: ${{ vars.GOOGLE_RECAPTCHA_SITE_KEY }}
      GOOGLE_RECAPTCHA_SECRET_KEY: ${{ secrets.GOOGLE_RECAPTCHA_SECRET_KEY }}
      HIDE_CHROME: ${{ vars.HIDE_CHROME || 'false' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
      CONTENTFUL_DELIVERY_TOKEN: ${{ secrets.CONTENTFUL_DELIVERY_TOKEN }}
      CONTENTFUL_PREVIEW_TOKEN: ${{ secrets.CONTENTFUL_PREVIEW_TOKEN }}
      CONTENTFUL_SIGNIN_TOKEN: ${{ secrets.CONTENTFUL_SIGNIN_TOKEN }}
      ASTRO_DB_REMOTE_URL: ${{ secrets.ASTRO_DB_REMOTE_URL }}
      ASTRO_DB_APP_TOKEN: ${{ secrets.ASTRO_DB_APP_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/prepare-env
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Deploy to Cloudflare Workers
        run: |
          NAME_FLAG=""
          if [ -n "${INPUTS_WORKER_NAME}" ]; then
            NAME_FLAG="--name ${INPUTS_WORKER_NAME}"
          fi
          pnpm exec wrangler deploy $NAME_FLAG
        env:
          INPUTS_WORKER_NAME: ${{ inputs.worker_name }}
      - name: Set Worker secrets
        run: |
          TARGET_FLAG=""
          if [ -n "${INPUTS_WORKER_NAME}" ]; then
            TARGET_FLAG="--name ${INPUTS_WORKER_NAME}"
          fi
          node -e "
          const required = ['RESEND_API_KEY','CONTENTFUL_SPACE_ID','CONTENTFUL_DELIVERY_TOKEN','CONTENTFUL_PREVIEW_TOKEN','CONTENTFUL_SIGNIN_TOKEN','ASTRO_DB_REMOTE_URL','ASTRO_DB_APP_TOKEN'];
          const missing = required.filter(k => !process.env[k]);
          if (missing.length) { console.error('Missing required secrets: ' + missing.join(', ')); process.exit(1); }
          process.stdout.write(JSON.stringify(Object.fromEntries(required.map(k => [k, process.env[k]]))));
          " | pnpm exec wrangler secret bulk $TARGET_FLAG
        env:
          INPUTS_WORKER_NAME: ${{ inputs.worker_name }}
