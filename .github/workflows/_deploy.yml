name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      wrangler_env:
        required: true
        type: string
      url:
        required: false
        type: string
      worker_name:
        required: false
        type: string
        description: Override the worker name (for per-PR preview deployments)
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      GOOGLE_RECAPTCHA_SECRET_KEY:
        required: false
      RESEND_API_KEY:
        required: true
      ASTRO_DB_REMOTE_URL:
        required: true
      ASTRO_DB_APP_TOKEN:
        required: true
      EMDASH_TURSO_URL:
        required: true
      EMDASH_TURSO_AUTH_TOKEN:
        required: true
      EMDASH_R2_ENDPOINT:
        required: true
      EMDASH_R2_BUCKET:
        required: true
      EMDASH_R2_ACCESS_KEY_ID:
        required: true
      EMDASH_R2_SECRET_ACCESS_KEY:
        required: true
      EMDASH_R2_PUBLIC_URL:
        required: false

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.wrangler_env }}-${{ inputs.worker_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ENV: ${{ inputs.wrangler_env }}
      SITE_URL: ${{ vars.SITE_URL }}
      BIANCA_EMAIL: ${{ vars.BIANCA_EMAIL }}
      TWITTER_HANDLE: ${{ vars.TWITTER_HANDLE }}
      GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID }}
      GOOGLE_TAG_MANAGER_ID: ${{ vars.GOOGLE_TAG_MANAGER_ID }}
      GOOGLE_RECAPTCHA_SITE_KEY: ${{ vars.GOOGLE_RECAPTCHA_SITE_KEY }}
      GOOGLE_RECAPTCHA_SECRET_KEY: ${{ secrets.GOOGLE_RECAPTCHA_SECRET_KEY }}
      HIDE_CHROME: ${{ vars.HIDE_CHROME || 'false' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ASTRO_DB_REMOTE_URL: ${{ secrets.ASTRO_DB_REMOTE_URL }}
      ASTRO_DB_APP_TOKEN: ${{ secrets.ASTRO_DB_APP_TOKEN }}
      EMDASH_TURSO_URL: ${{ secrets.EMDASH_TURSO_URL }}
      EMDASH_TURSO_AUTH_TOKEN: ${{ secrets.EMDASH_TURSO_AUTH_TOKEN }}
      EMDASH_R2_ENDPOINT: ${{ secrets.EMDASH_R2_ENDPOINT }}
      EMDASH_R2_BUCKET: ${{ secrets.EMDASH_R2_BUCKET }}
      EMDASH_R2_ACCESS_KEY_ID: ${{ secrets.EMDASH_R2_ACCESS_KEY_ID }}
      EMDASH_R2_SECRET_ACCESS_KEY: ${{ secrets.EMDASH_R2_SECRET_ACCESS_KEY }}
      EMDASH_R2_PUBLIC_URL: ${{ secrets.EMDASH_R2_PUBLIC_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/prepare-env
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Deploy to Cloudflare Workers
        run: |
          NAME_FLAG=""
          if [ -n "${INPUTS_WORKER_NAME}" ]; then
            NAME_FLAG="--name ${INPUTS_WORKER_NAME}"
          fi
          pnpm exec wrangler deploy $NAME_FLAG
        env:
          INPUTS_WORKER_NAME: ${{ inputs.worker_name }}
      - name: Set Worker secrets
        run: |
          TARGET_FLAG=""
          if [ -n "${INPUTS_WORKER_NAME}" ]; then
            TARGET_FLAG="--name ${INPUTS_WORKER_NAME}"
          fi
          node -e "
          const required = ['RESEND_API_KEY','ASTRO_DB_REMOTE_URL','ASTRO_DB_APP_TOKEN','EMDASH_TURSO_URL','EMDASH_TURSO_AUTH_TOKEN','EMDASH_R2_ENDPOINT','EMDASH_R2_BUCKET','EMDASH_R2_ACCESS_KEY_ID','EMDASH_R2_SECRET_ACCESS_KEY','EMDASH_R2_PUBLIC_URL'];
          const missing = required.filter(k => !process.env[k]);
          if (missing.length) { console.error('Missing required secrets: ' + missing.join(', ')); process.exit(1); }
          process.stdout.write(JSON.stringify(Object.fromEntries(required.map(k => [k, process.env[k]]))));
          " | pnpm exec wrangler secret bulk $TARGET_FLAG
        env:
          INPUTS_WORKER_NAME: ${{ inputs.worker_name }}
