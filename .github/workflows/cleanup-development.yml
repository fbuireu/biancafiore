name: Cleanup - Development

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    name: Delete preview deployment
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Delete Cloudflare Pages preview deployments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BRANCH="pr-${PR_NUMBER}"
          PROJECT_NAME="biancafiore"

          DEPLOYMENTS=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/deployments?page=1&per_page=25" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | \
            jq -r ".result[] | select(.deployment_trigger.metadata.branch == \"${BRANCH}\") | .id" 2>/dev/null || true)

          if [ -z "$DEPLOYMENTS" ]; then
            echo "No deployments found for branch ${BRANCH}, nothing to clean up."
            exit 0
          fi

          for ID in $DEPLOYMENTS; do
            echo "Deleting deployment: $ID"
            curl -s -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/deployments/${ID}?force=true" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          done

          echo "Cleanup complete for branch ${BRANCH}."
