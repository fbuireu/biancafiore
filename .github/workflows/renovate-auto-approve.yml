name: Renovate auto-approve
on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
permissions:
  pull-requests: write
concurrency:
  group: renovate-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  approve:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'renovate[bot]' &&
      (contains(github.event.pull_request.labels.*.name, 'patch-update') ||
       contains(github.event.pull_request.labels.*.name, 'minor-update') ||
       contains(github.event.pull_request.labels.*.name, 'lock-maintenance'))
    steps:
      - name: Check existing approval
        id: check
        run: |
          APPROVED=$(gh pr view "$PR_URL" --json reviews \
            --jq "[.reviews[] | select(.author.login == \"$OWNER\" and .state == \"APPROVED\")] | length")
          if [ "$APPROVED" -gt 0 ]; then
            echo "already-approved=true" >> $GITHUB_OUTPUT
          else
            echo "already-approved=false" >> $GITHUB_OUTPUT
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.PAT }}

      - name: Approve PR
        if: steps.check.outputs.already-approved == 'false'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.PAT }}
