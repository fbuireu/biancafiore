name: Deploy - Production

run-name: >-
  ${{ github.event_name == 'repository_dispatch'
      && format('Article "{0}" {1} — deploy triggered by Contentful Webhook', github.event.client_payload.title, github.event.action)
      || 'Deploy to production' }}

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [article-published, article-unpublished]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      wrangler_env: production
      url: https://biancafiore.me
    secrets: inherit
