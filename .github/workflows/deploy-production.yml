name: Deploy - Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      url: https://biancafiore.me
    secrets: inherit
