name = "biancafiore"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2026-03-12"

[assets]
directory = "dist"
binding = "ASSETS"

# EmDash uses Turso (libSQL over HTTP) for its database and R2 via the S3 API
# for media, so it needs no D1/R2 Worker bindings — only credentials, supplied
# as Worker secrets (see _deploy.yml / MIGRATION.md). KV `SESSION` stays.
[[kv_namespaces]]
binding = "SESSION"
id = "c9f2626f1a4043c0aea8a75985bdc0a1"
preview_id = "fde64789020f4160b0d835d190d8d5d6"

[env.development]
name = "biancafiore-development"

[[env.development.kv_namespaces]]
binding = "SESSION"
id = "fde64789020f4160b0d835d190d8d5d6"

[env.production]
name = "biancafiore"

[[env.production.kv_namespaces]]
binding = "SESSION"
id = "c9f2626f1a4043c0aea8a75985bdc0a1"

[[env.production.routes]]
pattern = "biancafiore.me"
custom_domain = true
